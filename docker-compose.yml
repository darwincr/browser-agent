services:
  opencode-a2a-xfce:
    build:
      context: .
      args:
        OPENCODE_A2A_VERSION: ${OPENCODE_A2A_VERSION:-1.1.1}
    image: custom-opencode-a2a-xfce:latest
    shm_size: "2gb"
    ports:
      - "${A2A_HOST_PORT:-8000}:8000"
      - "${OPENCODE_HOST_PORT:-14096}:4096"
      - "${VNC_HOST_PORT:-5900}:5900"
      - "${NOVNC_HOST_PORT:-6080}:6080"
    environment:
      A2A_PUBLIC_URL: ${A2A_PUBLIC_URL:-http://localhost:18000}
      A2A_BROWSER_VIEW_URL: ${A2A_BROWSER_VIEW_URL:-http://localhost:6080/vnc.html}
      OPENCODE_HOST: ${OPENCODE_HOST:-0.0.0.0}
      OPENCODE_WORKSPACE_ROOT: ${OPENCODE_WORKSPACE_ROOT:-/workspace}
      # Replace this before exposing the service outside your machine.
      A2A_STATIC_AUTH_CREDENTIALS: ${A2A_STATIC_AUTH_CREDENTIALS:-[{"scheme":"bearer","token":"change-me","principal":"local"}]}
      # Optional: set a VNC password. If omitted, VNC runs without a password.
      VNC_PASSWORD: ${VNC_PASSWORD:-}
      VNC_GEOMETRY: ${VNC_GEOMETRY:-1920x1080}
      VNC_DEPTH: ${VNC_DEPTH:-24}
      # Optional: max size for inline (base64) A2A file parts. Default 10 MiB.
      A2A_FILE_MAX_INLINE_BYTES: ${A2A_FILE_MAX_INLINE_BYTES:-10485760}
      # --- OpenCode provider secret (resolved from .env at compose time) ---
      # Required: backs the dr-openai LiteLLM provider.
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
    volumes:
      - ./workspace:/workspace
      - ./data:/data
      - opencode-home:/home/opencode
    configs:
      - source: opencode_config
        target: /home/opencode/.config/opencode/opencode.json
        mode: 0444
      - source: workspace_opencode_placeholder
        target: /workspace/opencode.json
        mode: 0444

volumes:
  opencode-home:

configs:
  opencode_config:
    file: ./docker/opencode.json
  workspace_opencode_placeholder:
    file: ./docker/workspace-opencode.json
